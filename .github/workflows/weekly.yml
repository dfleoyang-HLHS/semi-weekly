name: Weekly Semi Report

on:
  schedule:
    # 每週一台北時間 06:00 (UTC 週日 22:00)
    - cron: '0 22 * * 0'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser pyyaml anthropic requests

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Generate draft (Claude API)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_draft.py

      - name: Build index
        run: python scripts/build_index.py

      - name: Commit draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ data/
          if git diff --staged --quiet; then
            echo "無新內容,跳過 commit"
          else
            git commit -m "🤖 Weekly draft $(date +%Y-W%V)"
            git push
          fi

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
