name: Weekly Semi Report Free

on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      week_tag: ${{ steps.weekinfo.outputs.week_tag }}
      news_count: ${{ steps.weekinfo.outputs.news_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser pyyaml requests

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Prepare Claude prompt
        run: python scripts/prepare_prompt.py

      - name: Build index
        run: python scripts/build_index.py

      - name: Get week info
        id: weekinfo
        run: |
          WEEK_TAG=$(date +%Y-W%V)
          NEWS_COUNT=$(python -c "import json; print(json.load(open('data/raw_news.json'))['total'])")
          echo "week_tag=$WEEK_TAG" >> $GITHUB_OUTPUT
          echo "news_count=$NEWS_COUNT" >> $GITHUB_OUTPUT

      - name: Commit prompt and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Weekly prompt $(date +%Y-W%V)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "Push retry $i/5"
              sleep 5
            done
          fi

      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const weekTag = '${{ steps.weekinfo.outputs.week_tag }}';
            const newsCount = '${{ steps.weekinfo.outputs.news_count }}';
            const repo = context.repo;
            const promptUrl = `https://github.com/${repo.owner}/${repo.repo}/blob/main/data/weekly_prompt.md`;
            const body = `## 本週 (${weekTag}) 週報素材已準備好\n\n抓取 ${newsCount} 則新聞\n\n### 三步驟\n\n1. 開啟 [weekly_prompt.md](${promptUrl}) 點 Raw 全選複製\n2. 貼到 https://claude.ai\n3. 把回覆存成 posts/${weekTag}-semi-weekly.md\n\n完成後請關閉此 issue。`;
            await github.rest.issues.create({
              owner: repo.owner,
              repo: repo.repo,
              title: `${weekTag} 週報待撰寫 (${newsCount} 則新聞)`,
              body: body,
              labels: ['weekly-report']
            });

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
