name: Semi Weekly and Briefs

on:
  schedule:
    - cron: '0 22 * * 0'
    - cron: '0 22 * * 2,4'
  workflow_dispatch:
    inputs:
      mode:
        description: 'mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - weekly
          - brief

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser pyyaml requests
      - name: Detect mode
        id: detect
        run: |
          DOW=$(date +%u)
          INPUT_MODE="${{ inputs.mode }}"
          if [ "$INPUT_MODE" = "weekly" ]; then MODE="weekly"
          elif [ "$INPUT_MODE" = "brief" ]; then MODE="brief"
          elif [ "$DOW" = "1" ]; then MODE="weekly"
          else MODE="brief"; fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "week_tag=$(date +%Y-W%V)" >> $GITHUB_OUTPUT
      - run: python scripts/fetch_news.py
      - name: Run prepare
        run: |
          if [ "${{ steps.detect.outputs.mode }}" = "weekly" ]; then
            python scripts/prepare_prompt.py
          else
            python scripts/generate_news_brief.py
          fi
      - run: python scripts/build_index.py
