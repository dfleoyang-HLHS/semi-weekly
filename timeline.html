<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間軸 - 半導體週報</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.timeline {
  position: relative;
  padding: 20px 0;
  margin-top: 20px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 80px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}
.timeline-item {
  position: relative;
  padding-left: 120px;
  margin-bottom: 32px;
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: 73px;
  top: 8px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--bg);
}
.timeline-date {
  position: absolute;
  left: 0;
  top: 4px;
  width: 60px;
  text-align: right;
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 600;
}
.timeline-week {
  display: inline-block;
  padding: 2px 8px;
  background: rgba(94, 234, 212, 0.1);
  color: var(--accent);
  border-radius: 4px;
  font-size: 12px;
  margin-bottom: 6px;
}
.timeline-title {
  font-size: 17px;
  margin-bottom: 6px;
}
.timeline-title a { color: var(--text); }
.timeline-title a:hover { color: var(--accent); }
.timeline-summary {
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.6;
}
</style>
</head>
<body>

<header class="hero">
  <div class="container">
    <h1>半導體 + AI 供應鏈週報</h1>
    <nav>
      <a href="index.html">首頁</a>
      <a href="companies.html">公司</a>
      <a href="regions.html">區域</a>
      <a href="timeline.html" class="active">時間軸</a>
      <a href="search.html">搜尋</a>
    </nav>
  </div>
</header>

<main class="container">
  <section>
    <h2>📅 報告時間軸</h2>
    <p style="color:var(--text-dim); margin-bottom:24px;">依時間順序檢視所有週報,追蹤產業脈動。</p>
    <div class="timeline" id="timeline">載入中…</div>
  </section>
</main>

<footer>
  <div class="container"><p>每週一自動更新</p></div>
</footer>

<script>
async function loadTimeline() {
  try {
    const db = await (await fetch('data/db.json')).json();
    const articles = db.articles || [];

    if (!articles.length) {
      document.getElementById('timeline').innerHTML =
        '<p style="color:var(--text-dim)">尚無報告</p>';
      return;
    }

    const html = articles.map(a => {
      const dateStr = a.date || '';
      const monthDay = dateStr.length >= 10
        ? `${parseInt(dateStr.slice(5,7))}/${parseInt(dateStr.slice(8,10))}`
        : dateStr;
      return `
        <div class="timeline-item">
          <div class="timeline-date">${monthDay}</div>
          ${a.week ? `<span class="timeline-week">${a.week}</span>` : ''}
          <h3 class="timeline-title">
            <a href="article.html?slug=${encodeURIComponent(a.slug)}">${a.title}</a>
          </h3>
          <div class="timeline-summary">${a.summary}</div>
        </div>
      `;
    }).join('');

    document.getElementById('timeline').innerHTML = html;
  } catch (err) {
    document.getElementById('timeline').innerHTML =
      '<p style="color:var(--danger)">載入失敗</p>';
    console.error(err);
  }
}

loadTimeline();
</script>
</body>
</html>
